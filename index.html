<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SonifyArt | Your Voice, Visualized</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        :root {
            --bg: #FFFFFF;
            --section: #F8F9FF;
            --primary: #6366F1;
            --glass: rgba(255, 255, 255, 0.8);
            --radius: 28px;
            --shadow: 0 10px 30px rgba(99, 102, 241, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #1A1A1A;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- UI LAYERS --- */
        #canvas-container {
            flex: 1;
            position: relative;
            background: var(--section);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 0;
            width: 100%;
            padding: 0 24px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 700; letter-spacing: -1px; color: var(--primary); font-size: 1.2rem; }
        #fingerprint { font-family: monospace; font-size: 0.8rem; opacity: 0.5; background: #eee; padding: 4px 8px; border-radius: 8px; }

        /* --- CONTROLS --- */
        #controls-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.5);
            padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
            border-radius: var(--radius) var(--radius) 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.03);
            z-index: 20;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lens-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .lens-btn {
            background: white;
            border: 1px solid #E0E0E0;
            border-radius: 16px;
            padding: 12px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lens-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* --- RECORD BUTTON --- */
        .action-area { display: flex; justify-content: center; align-items: center; gap: 16px; }

        #record-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
            transition: transform 0.2s;
        }

        #record-btn.recording {
            animation: pulse 1.5s infinite;
            background: #FF4757;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .btn-secondary {
            flex: 1;
            padding: 16px;
            border-radius: 18px;
            border: none;
            background: #f0f0f0;
            font-weight: 600;
            font-family: inherit;
        }

        .hidden { display: none !important; }
        
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--glass);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SONIFY ART</div>
        <div id="seed-display" class="hidden">SEED <span id="fingerprint">#A1B2C3</span></div>
    </header>

    <div id="canvas-container">
        <div id="loading-overlay" class="hidden">
            <p id="loading-text">Mapping Frequencies...</p>
        </div>
    </div>

    <section id="controls-panel">
        <div id="lens-selection" class="hidden">
            <div class="lens-grid">
                <button class="lens-btn active" onclick="switchLens('lullaby', this)">LULLABY</button>
                <button class="lens-btn" onclick="switchLens('prism', this)">PRISM</button>
                <button class="lens-btn" onclick="switchLens('echo', this)">ECHO</button>
                <button class="lens-btn" onclick="switchLens('matrix', this)">MATRIX</button>
            </div>
        </div>

        <div class="action-area">
            <button id="record-btn" onclick="toggleRecording()">REC</button>
            <button id="download-btn" class="btn-secondary hidden" onclick="exportArt()">DOWNLOAD 300 DPI</button>
        </div>
    </section>

    <script>
        let isRecording = false;
        let audioCtx, analyser, dataArray;
        let currentLens = 'lullaby';
        let recordedData = [];
        let seed = "000000";

        // --- P5.JS ENGINE ---
        function setup() {
            let container = document.getElementById('canvas-container');
            let cnv = createCanvas(container.offsetWidth, container.offsetHeight);
            cnv.parent('canvas-container');
            noFill();
        }

        function draw() {
            background(248, 249, 255); // #F8F9FF
            
            if (isRecording) {
                analyser.getByteFrequencyData(dataArray);
                recordedData.push([...dataArray]);
                renderArt(dataArray);
            } else if (recordedData.length > 0) {
                // Static display of recorded voice "essence"
                renderArt(recordedData[Math.floor(frameCount % recordedData.length)]);
            } else {
                // Idle state: gentle floating circle
                drawIdle();
            }
        }

        function windowResized() {
            let container = document.getElementById('canvas-container');
            resizeCanvas(container.offsetWidth, container.offsetHeight);
        }

        // --- LENS LOGIC ---
        function renderArt(data) {
            push();
            translate(width/2, height/2);
            strokeWeight(2);
            
            if (currentLens === 'lullaby') {
                stroke(99, 102, 241, 150);
                for (let i = 0; i < 5; i++) {
                    beginShape();
                    for (let j = 0; j < data.length; j+=2) {
                        let r = map(data[j], 0, 255, 50, 200) + (i * 20);
                        let x = r * cos(j + frameCount * 0.01);
                        let y = r * sin(j + frameCount * 0.01);
                        curveVertex(x, y);
                    }
                    endShape(CLOSE);
                }
            } else if (currentLens === 'prism') {
                stroke(99, 102, 241);
                for (let i = 0; i < data.length; i+=8) {
                    let h = map(data[i], 0, 255, 10, 300);
                    rotate(PI/10);
                    line(0, 0, 0, -h);
                }
            } else if (currentLens === 'echo') {
                noStroke();
                fill(99, 102, 241, 40);
                for (let i = 0; i < 10; i++) {
                    let sz = map(data[i*10], 0, 255, 10, 400);
                    ellipse(sin(frameCount*0.02)*50, cos(frameCount*0.02)*50, sz, sz);
                }
            } else if (currentLens === 'matrix') {
                stroke(212, 175, 55); // Gold for Kintsugi vibe
                strokeWeight(1);
                for (let i = 0; i < 20; i++) {
                    let r = map(data[i], 0, 255, 0, width/2);
                    rectMode(CENTER);
                    rotate(frameCount * 0.001);
                    rect(0, 0, r, r);
                }
            }
            pop();
        }

        function drawIdle() {
            push();
            translate(width/2, height/2);
            stroke(99, 102, 241, 50);
            ellipse(0, 0, 200 + sin(frameCount*0.05)*10, 200 + cos(frameCount*0.05)*10);
            pop();
        }

        // --- AUDIO ENGINE ---
        async function toggleRecording() {
            if (!isRecording) {
                // START
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    analyser.fftSize = 128;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                }
                
                recordedData = [];
                isRecording = true;
                document.getElementById('record-btn').classList.add('recording');
                document.getElementById('record-btn').innerText = "STOP";
            } else {
                // STOP
                isRecording = false;
                document.getElementById('record-btn').classList.remove('recording');
                document.getElementById('record-btn').innerText = "REC";
                finalizeArt();
            }
        }

        function finalizeArt() {
            // Generate "Fingerprint" from data length and average pitch
            const avg = recordedData.reduce((acc, val) => acc + val[0], 0) / recordedData.length;
            seed = Math.floor(avg * recordedData.length).toString(16).toUpperCase().substring(0, 6);
            
            document.getElementById('loading-overlay').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('lens-selection').classList.remove('hidden');
                document.getElementById('seed-display').classList.remove('hidden');
                document.getElementById('download-btn').classList.remove('hidden');
                document.getElementById('fingerprint').innerText = `#${seed}`;
            }, 1500);
        }

        function switchLens(lens, btn) {
            currentLens = lens;
            document.querySelectorAll('.lens-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function exportArt() {
            // 300 DPI Export Logic (Saves current canvas state)
            saveCanvas(`SonifyArt_${seed}`, 'png');
        }
    </script>
</body>
</html>
